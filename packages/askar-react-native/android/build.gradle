import java.nio.file.Paths

buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    // AGP 7.4+ required by the com.facebook.react Gradle plugin (RN Codegen).
    // The host app's AGP version takes precedence at resolution time.
    classpath 'com.android.tools.build:gradle:7.4.2'
    classpath 'de.undercouch:gradle-download-task:4.1.2'
  }
}

static def findNodeModules(baseDir) {
  def basePath = baseDir.toPath().normalize()
  while (basePath) {
    def nodeModulesPath = Paths.get(basePath.toString(), "node_modules")
    def reactNativePath = Paths.get(nodeModulesPath.toString(), "react-native")
    if (nodeModulesPath.toFile().exists() && reactNativePath.toFile().exists()) {
      return nodeModulesPath.toString()
    }
    basePath = basePath.getParent()
  }
  throw new GradleException("askar: Failed to find node_modules/ path!")
}

static def findNodeModulePath(baseDir, packageName) {
    def basePath = baseDir.toPath().normalize()
    while (basePath) {
        def candidatePath = Paths.get(basePath.toString(), "node_modules", packageName)
        if (candidatePath.toFile().exists()) {
            return candidatePath.toString()
        }
        basePath = basePath.getParent()
    }
    return null
}

def isNewArchitectureEnabled() {
    return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}

def nodeModules = findNodeModules(projectDir)

def reactNative = new File("$nodeModules/react-native")
def CMAKE_NODE_MODULES_DIR = project.getProjectDir().getParentFile().getParent()
def reactProperties = new Properties()
file("$nodeModules/react-native/ReactAndroid/gradle.properties").withInputStream { reactProperties.load(it) }
def REACT_NATIVE_VERSION = reactProperties.getProperty("VERSION_NAME").split("\\.")[1].toInteger()

apply plugin: 'com.android.library'
apply plugin: 'de.undercouch.download'
// The React Native Gradle plugin runs Codegen for libraries when the New
// Architecture is enabled. It is provided by `react-native` itself and does
// not need to be listed in the `buildscript.classpath` when using a modern
// RN autolinking setup (RN >= 0.73).
if (isNewArchitectureEnabled()) {
  apply plugin: 'com.facebook.react'
}

def getExt(name) {
  return rootProject.ext.get(name)
}

def getExtWithFallback(prop, fallback) {
  return rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

def resolveBuildType() {
    def buildType = "debug"
    tasks.all({ task ->
        if (task.name == "buildCMakeRelease") {
            buildType = "release"
        }
    })
    return buildType
}

android {
  compileSdkVersion getExt('compileSdkVersion')
  buildToolsVersion getExt('buildToolsVersion')
  ndkVersion getExt('ndkVersion')

  buildFeatures {
    prefab true
  }
  
  defaultConfig {
    minSdkVersion getExtWithFallback('minSdkVersion', 21) 
    targetSdkVersion getExt('targetSdkVersion')
    
    externalNativeBuild {
        cmake {
            cppFlags "-fexceptions", "-frtti", "-std=c++1y", "-DONANDROID"
            abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
            arguments "-DANDROID_STL=c++_shared",
                      "-DREACT_NATIVE_VERSION=${REACT_NATIVE_VERSION}",
                      "-DNODE_MODULES_DIR=${nodeModules}",
                      "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        }
    }
    
  }
  
  externalNativeBuild {
      cmake {
          path "CMakeLists.txt"
      }
  }

  packagingOptions {
    if (REACT_NATIVE_VERSION >= 76) {
      excludes = ["**/libjsi.so", "**/libreactnative.so" ]
    } else {
      excludes = ["**/libjsi.so", "**/libreactnativejni.so" ]
    }
  }
  
  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable 'GradleCompatible'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  configurations {
    extractHeaders
    extractJNI
  }

  sourceSets {
    main {
      jniLibs.srcDirs = ['../native/mobile/android']
      // Under the New Architecture the Codegen-generated `NativeAskarSpec`
      // abstract class is available, so we expose a module that extends it.
      // Under the Old Architecture we fall back to the legacy
      // `ReactContextBaseJavaModule` implementation.
      if (isNewArchitectureEnabled()) {
        java.srcDirs += ['src/newarch/java']
      } else {
        java.srcDirs += ['src/oldarch/java']
      }
    }
  }
}

repositories {
  mavenCentral()
  google()

  def found = false
  def defaultDir = null
  def androidSourcesName = 'React Native sources'

  if (rootProject.ext.has('reactNativeAndroidRoot')) {
    defaultDir = rootProject.ext.get('reactNativeAndroidRoot')
  } else {
    defaultDir = new File(
            projectDir,
            '/../../../node_modules/react-native/android'
    )
  }

  if (defaultDir.exists()) {
    maven {
      url defaultDir.toString()
      name androidSourcesName
    }

    logger.info(":${project.name}:reactNativeAndroidRoot ${defaultDir.canonicalPath}")
    found = true
  } else {
    def parentDir = rootProject.projectDir

    1.upto(5, {
      if (found) return true
      parentDir = parentDir.parentFile

      def androidSourcesDir = new File(
              parentDir,
              'node_modules/react-native'
      )

      def androidPrebuiltBinaryDir = new File(
              parentDir,
              'node_modules/react-native/android'
      )

      if (androidPrebuiltBinaryDir.exists()) {
        maven {
          url androidPrebuiltBinaryDir.toString()
          name androidSourcesName
        }

        logger.info(":${project.name}:reactNativeAndroidRoot ${androidPrebuiltBinaryDir.canonicalPath}")
        found = true
      } else if (androidSourcesDir.exists()) {
        maven {
          url androidSourcesDir.toString()
          name androidSourcesName
        }

        logger.info(":${project.name}:reactNativeAndroidRoot ${androidSourcesDir.canonicalPath}")
        found = true
      }
    })
  }

  if (!found) {
    throw new GradleException(
            "${project.name}: unable to locate React Native android sources. " +
                    "Ensure you have you installed React Native as a dependency in your project and try again."
    )
  }
}


dependencies {
  implementation "com.facebook.react:react-android:"
}

def downloadsDir = new File("$buildDir/downloads")

task createNativeDepsDirectories {
  doLast {
    downloadsDir.mkdirs()
  }
}


task extractAARHeaders {
  doLast {
    configurations.extractHeaders.files.each {
      def file = it.absoluteFile
      copy {
        from zipTree(file)
        into "$buildDir/$file.name"
        include "**/*.h"
      }
    }
  }
}

extractAARHeaders.mustRunAfter createNativeDepsDirectories

task extractJNIFiles {
  doLast {
    configurations.extractJNI.files.each {
      def file = it.absoluteFile

      copy {
        from zipTree(file)
        into "$buildDir/$file.name"
        include "jni/**/*"
      }
    }
  }
}

extractJNIFiles.mustRunAfter extractAARHeaders

tasks.whenTaskAdded { task ->
  if (!task.name.contains('Clean') && (task.name.contains('externalNative') || task.name.contains('CMake'))) {
    task.dependsOn(extractAARHeaders)
    task.dependsOn(extractJNIFiles)
  }
}

// -----------------------------------------------------------------------------
// React Native Codegen
// -----------------------------------------------------------------------------
// Must mirror the `codegenConfig` entry in the library's `package.json`.
// Only applied under the New Architecture because the `com.facebook.react`
// plugin is conditionally applied above.
if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/specs/")
    libraryName = "RNAskarSpec"
    codegenJavaPackageName = "foundation.openwallet.askar"
  }
}
